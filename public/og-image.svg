<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#6366f1" opacity="0.06"/>
  <circle cx="1100" cy="530" r="250" fill="#8b5cf6" opacity="0.06"/>
  <circle cx="900" cy="80" r="120" fill="#818cf8" opacity="0.04"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>

  <!-- AI icon / robot face -->
  <rect x="520" y="120" width="160" height="120" rx="24" fill="none" stroke="url(#glow)" stroke-width="3"/>
  <circle cx="565" cy="175" r="14" fill="#818cf8"/>
  <circle cx="635" cy="175" r="14" fill="#818cf8"/>
  <rect x="555" y="210" width="90" height="6" rx="3" fill="#818cf8" opacity="0.6"/>
  <rect x="510" y="155" width="16" height="30" rx="8" fill="#6366f1" opacity="0.5"/>
  <rect x="674" y="155" width="16" height="30" rx="8" fill="#6366f1" opacity="0.5"/>
  <rect x="580" y="100" width="40" height="24" rx="4" fill="none" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <line x1="600" y1="100" x2="600" y2="85" stroke="#818cf8" stroke-width="2" opacity="0.4"/>
  <circle cx="600" cy="80" r="5" fill="#818cf8" opacity="0.4"/>

  <!-- Main title -->
  <text x="600" y="320" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="white" text-anchor="middle" letter-spacing="2">
    AINewbie<tspan fill="url(#glow)">VN</tspan>
  </text>

  <!-- Tagline -->
  <text x="600" y="385" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="32" font-weight="400" fill="#94a3b8" text-anchor="middle">
    Cộng đồng AI Việt Nam #1
  </text>

  <!-- Divider -->
  <rect x="500" y="415" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5"/>

  <!-- Stats row -->
  <text x="340" y="475" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#818cf8" text-anchor="middle">5,000+</text>
  <text x="340" y="500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Thành viên</text>

  <text x="600" y="475" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#818cf8" text-anchor="middle">1,200+</text>
  <text x="600" y="500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Workflows</text>

  <text x="860" y="475" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="700" fill="#818cf8" text-anchor="middle">300+</text>
  <text x="860" y="500" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">Dự án AI</text>

  <!-- URL -->
  <text x="600" y="570" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="600" fill="#6366f1" text-anchor="middle" letter-spacing="1">
    ainewbievn.shop
  </text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="url(#accent)"/>
</svg>
